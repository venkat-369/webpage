<!DOCTYPE html>
<html>
<head>
  <title>Sai Duplex Homes</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }
    header {
      background: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      width: 300px;
      margin: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
      overflow: hidden;
    }
    .card img {
      width: 100%;
      height: 200px;
    }
    .card h3 {
      padding: 10px;
    }
    .card p {
      padding: 0 10px 10px;
    }
    footer {
      background: #2c3e50;
      color: white;
      text-align: center;
      padding: 15px;
    }
  </style>
</head>
<body>

<header>
  <h1>🏠 Sai Duplex & Villa Projects</h1>
  <p>Premium Buildings & Dream Homes</p>
</header>

<div class="container">

  <div class="card">
    <img src="https://picsum.photos/400/200?house1">
    <h3>Luxury Duplex</h3>
    <p>Modern 3BHK duplex with garden.</p>
  </div>

  <div class="card">
    <img src="https://picsum.photos/400/200?house2">
    <h3>Premium Villa</h3>
    <p>Independent villa with swimming pool.</p>
  </div>

  <div class="card">
    <img src="https://picsum.photos/400/200?house3">
    <h3>City Apartment</h3>
    <p>Affordable apartment in prime location.</p>
  </div>

</div>

<footer>
  <p>© 2026 Sai Constructions</p>
</footer>

</body>
</html>
